name: TTS Linux Tests
on:
  workflow_call:

jobs:
  linux:
    name: ${{ matrix.compiler.preset }} (${{ matrix.options }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jfalcou/compilers:${{ matrix.compiler.image }}
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { preset: "gcc"           , image: "v10" }
          - { preset: "clang"         , image: "v10" }
          - { preset: "clang-libc++"  , image: "v10" }
          - { preset: "gcc"           , image: "v10"    , setup: "./.github/scripts/g++-14.sh"  }
          - { preset: "clang"         , image: "v10"    , setup: "./.github/scripts/clang20.sh" }
          - { preset: "clang-libc++"  , image: "v10"    , setup: "./.github/scripts/clang20.sh" }
          - { preset: "icpx"          , image: "sycl-v1", setup: "/opt/intel/oneapi/setvars.sh" }
          - { preset: "wasm"          , image: "v10"    , wrapper: "emcmake" }

        options: [Debug, Release]

    steps:
      - name: Fetch current branch
        uses: actions/checkout@v6

      - name: Configure CMake and Build
        uses: ./.github/actions/config
        with:
          config: ${{ matrix.options }}
          preset: ${{ matrix.compiler.preset }}
          wrapper: ${{ matrix.compiler.wrapper }}
          setup-script: ${{ matrix.compiler.setup }}

      - name: Run Unit Tests
        uses: ./.github/actions/test
        with:
          config: ${{ matrix.options }}
          preset: ${{ matrix.compiler.preset }}
