name: KUMI MacOS Tests
on:
  workflow_call:

jobs:
  macos:
    name: ${{ matrix.compiler.name }} (${{ matrix.options }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - &clang {
              name: "apple-clang",
              bin: "clang++",
              extra: ""
            }
          - &android {
              name: "android",
              bin: "clang++",
              extra: "-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a"
            }
        options: ["-O0", "-O3 -flto -DNDEBUG"]

        include:
          - compiler: *clang
            options: "-O0 -stdlib=libc++"
            linker: "-DCMAKE_EXE_LINKER_FLAGS='-stdlib=libc++'"
          - compiler: *clang
            options: "-O3 -flto -DNDEBUG -stdlib=libc++"
            linker: "-DCMAKE_EXE_LINKER_FLAGS='-stdlib=libc++'"
    steps:
      - name: Fetch current branch
        uses: actions/checkout@v4.1.1

      - name: Configure CMake
        run: |
          cmake -S . -B build                               \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.bin }} \
            -DCMAKE_CXX_FLAGS="${{ matrix.options }}"       \
            ${{ matrix.linker }}                            \
            ${{ matrix.compiler.extra }}

      - name: Compile Unit Tests
        run: cmake --build build --target kumi-test -j 2

      - name: Run Unit Tests
        # Android builds are cross-compiled and can't run directly on the Mac runner
        if: matrix.compiler.name != 'android'
        run: ctest --test-dir build --output-on-failure -j 2
